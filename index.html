<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;height:-webkit-fill-available}
body{
  min-height:100%;min-height:-webkit-fill-available;
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  font-size:13px;color:#1a1a18;overflow:hidden;
}
:root{
  --sab:env(safe-area-inset-bottom,20px);
  --sat:env(safe-area-inset-top,0px);
  --bg:#f7f6f2;--cp:#fff;--cs:#f2f1ed;--ct:#eae9e4;
  --ci:#e6f1fb;--csu:#eaf3de;--cw:#faeeda;--cd:#fcebeb;

  height:100vh;

  flex:1;padding:14px 16px;font-size:14px;line-height:2.1;

}

<body>
<input type="file" id="file-input" accept=".html,.htm">
<div id="app"></div>
<script>
'use strict';
const BD='.5px solid var(--bt)',R='var(--r)',RL='var(--rl)',WK='nv-tts-v2';
const stG=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};
const stS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const stD=k=>{try{localStorage.removeItem(k)}catch{}};
const g=id=>document.getElementById(id);

let S={
  page:'main',works:[],work:null,
  partId:null,epId:null,body:'',dirty:false,
  playing:false,ttsStatus:'idle',
  stVoice:stG('tts-voice')||'Yuna',
  stRate:stG('tts-rate')||'0.92',
  stShowCfg:false,
  uploading:false,upErr:''
};
let editorEl=null;

/* ─── re-render: 에디터 화면이면 본문 내용 먼저 보존 ─── */
const set=u=>{
  // 에디터가 열려 있을 때 re-render 전에 현재 innerHTML 보존
  if(S.page==='editor' && editorEl && !u.hasOwnProperty('body')){
    S.body=editorEl.innerHTML||S.body;
  }
  Object.assign(S,u);
  render();
};

/* ─── Storage ─── */
function saveWork(w){stS('nv-w-'+w.id,w)}
function loadWork(id){return stG('nv-w-'+id)}
function getBodyHTML(){return editorEl?editorEl.innerHTML||'':S.body||''}
function getBodyText(){return editorEl?(editorEl.innerText||'').replace(/\n{3,}/g,'\n\n').trimEnd():(S.body||'').replace(/<[^>]+>/g,'')}

/* ─── TTS ─── */
let _ttsCharIndex=0,_ttsEpId=null;
const _allVoices=[];
function loadVoices(){
  const vs=window.speechSynthesis.getVoices();
  if(!vs.length)return;
  _allVoices.length=0;vs.forEach(v=>_allVoices.push(v));
  const saved=stG('tts-voice');
  if(!saved){
    const best=vs.find(v=>v.name==='Yuna')||vs.find(v=>v.name==='유나')||vs.find(v=>v.lang==='ko-KR'&&v.localService)||vs.find(v=>v.lang==='ko-KR');
    if(best){S.stVoice=best.name;stS('tts-voice',best.name)}
  }
}
function stopSp(rerender=true){
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
  if(rerender)set({playing:false,ttsStatus:'idle'});
  else{S.playing=false;S.ttsStatus='idle'}
}
function togSp(){
  if(S.playing){stopSp();return}
  const txt=getBodyText();if(!txt.trim())return;
  window.speechSynthesis.cancel();loadVoices();
  const startFrom=(_ttsEpId===S.epId&&_ttsCharIndex>0)?_ttsCharIndex:0;
  _ttsEpId=S.epId;
  const u=new SpeechSynthesisUtterance(startFrom>0?txt.slice(startFrom):txt);
  const vs=window.speechSynthesis.getVoices();
  const voice=vs.find(v=>v.name===S.stVoice)||vs.find(v=>v.lang==='ko-KR'&&v.localService)||vs.find(v=>v.lang==='ko-KR');
  if(voice){u.voice=voice;u.lang=voice.lang}else u.lang='ko-KR';
  u.rate=parseFloat(S.stRate||'0.92');u.pitch=1.0;
  u.onstart=()=>set({playing:true,ttsStatus:'playing'});
  u.onboundary=e=>{if(e.name==='word')_ttsCharIndex=startFrom+(e.charIndex||0)};
  u.onend=()=>{_ttsCharIndex=0;_ttsEpId=null;set({playing:false,ttsStatus:'idle'})};
  u.onerror=e=>{if(e.error==='interrupted'||e.error==='canceled')return;set({playing:false,ttsStatus:'idle'})};
  window.speechSynthesis.speak(u);
  set({playing:true,ttsStatus:'playing'});
}

/* ─── 웹소설 양식 ─── */
function applyWebnovelFormat(text){
  if(!text)return text;
  let t=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  t=t.replace(/[ \t]+$/gm,'').replace(/^[ \t]+/gm,'');
  return t.split('\n').map(l=>l.trim()).filter(l=>l.length>0).join('\n');
}

/* ─── DOM helpers ─── */
function mk(tag,o={}){
  const d=document.createElement(tag);
  if(o.style)Object.assign(d.style,o.style);
  if(o.onclick)d.onclick=o.onclick;
  if(o.className)d.className=o.className;
  if(o.id)d.id=o.id;
  if(o.textContent!==undefined)d.textContent=o.textContent;
  if(o.innerHTML!==undefined)d.innerHTML=o.innerHTML;
  if(o.disabled!==undefined)d.disabled=o.disabled;
  return d;
}
const spnr=()=>`<i class="ti ti-loader" style="animation:spin 1s linear infinite;display:inline-block;font-size:12px"></i>`;
function mkBtn(html,cb,o={}){
  const b=mk('button');b.innerHTML=html;b.onclick=cb;
  if(o.id)b.id=o.id;
  Object.assign(b.style,{display:'inline-flex',alignItems:'center',gap:'4px',padding:'5px 11px',fontSize:'11px',border:BD,borderRadius:R,cursor:'pointer',background:'var(--cp)',color:'var(--ts)',...(o.style||{})});
  if(o.disabled){b.disabled=true;Object.assign(b.style,{opacity:'.4',cursor:'default'})}
  return b;
}

/* ─── Dialogs ─── */
function showConfirm(msg,onOk,okLabel='삭제',danger=true){
  const ov=mk('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,.4)',zIndex:'9999',display:'flex',alignItems:'center',justifyContent:'center'}});
  const box=mk('div',{style:{background:'var(--cp)',borderRadius:RL,padding:'20px 22px',maxWidth:'300px',width:'90%',boxShadow:'0 8px 32px rgba(0,0,0,.2)'}});
  box.appendChild(mk('div',{textContent:msg,style:{fontSize:'13px',color:'var(--tp)',marginBottom:'16px',lineHeight:'1.55'}}));
  const btns=mk('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}});
  const ca=mk('button');ca.textContent='취소';ca.onclick=()=>document.body.removeChild(ov);Object.assign(ca.style,{padding:'6px 14px',fontSize:'12px',border:BD,borderRadius:R,cursor:'pointer',background:'var(--cs)',color:'var(--ts)'});
  const ok=mk('button');ok.textContent=okLabel;ok.onclick=()=>{document.body.removeChild(ov);onOk()};Object.assign(ok.style,{padding:'6px 14px',fontSize:'12px',border:'none',borderRadius:R,cursor:'pointer',background:danger?'#c0392b':'var(--tp)',color:'#fff',fontWeight:'500'});
  btns.append(ca,ok);box.appendChild(btns);ov.appendChild(box);
  ov.onclick=e=>{if(e.target===ov)document.body.removeChild(ov)};
  document.body.appendChild(ov);
}
function showPrompt(msg,def,onOk,multiline=false){
  const ov=mk('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,.4)',zIndex:'9999',display:'flex',alignItems:'center',justifyContent:'center'}});
  const box=mk('div',{style:{background:'var(--cp)',borderRadius:RL,padding:'20px 22px',maxWidth:'360px',width:'92%',boxShadow:'0 8px 32px rgba(0,0,0,.2)'}});
  box.appendChild(mk('div',{textContent:msg,style:{fontSize:'13px',color:'var(--tp)',marginBottom:'10px'}}));
  const inp=multiline?Object.assign(document.createElement('textarea'),{rows:5}):Object.assign(document.createElement('input'),{type:'text'});
  inp.value=def||'';
  Object.assign(inp.style,{width:'100%',padding:'8px 10px',fontSize:'13px',border:BD,borderRadius:R,marginBottom:'14px',color:'var(--tp)',background:'var(--cs)',boxSizing:'border-box',fontFamily:'inherit',resize:multiline?'vertical':'none'});
  box.appendChild(inp);
  const btns=mk('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}});
  const ca=mk('button');ca.textContent='취소';ca.onclick=()=>document.body.removeChild(ov);Object.assign(ca.style,{padding:'6px 14px',fontSize:'12px',border:BD,borderRadius:R,cursor:'pointer',background:'var(--cs)',color:'var(--ts)'});
  const ok=mk('button');ok.textContent='확인';ok.onclick=()=>{const v=inp.value.trim();document.body.removeChild(ov);onOk(v)};Object.assign(ok.style,{padding:'6px 14px',fontSize:'12px',border:'none',borderRadius:R,cursor:'pointer',background:'var(--tp)',color:'var(--cp)',fontWeight:'500'});
  btns.append(ca,ok);box.appendChild(btns);ov.appendChild(box);
  ov.onclick=e=>{if(e.target===ov)document.body.removeChild(ov)};
  document.body.appendChild(ov);
  setTimeout(()=>inp.focus(),50);
  inp.onkeydown=e=>{if(!multiline&&e.key==='Enter'){const v=inp.value.trim();document.body.removeChild(ov);onOk(v)}if(e.key==='Escape')document.body.removeChild(ov)};
}

/* ─── Download ─── */
function downloadWork(){
  if(!S.work)return;
  const w=S.work;
  let html='<!DOCTYPE html>\n<html lang="ko">\n<head>\n<meta charset="UTF-8">\n';
  html+=`<title>${w.title}</title>\n`;
  html+=`<script type="application/json" id="novel-export-data">${JSON.stringify(w)}<\/script>\n`;
  html+='</head>\n<body>\n';
  html+=`<h1>${w.title}</h1>\n`;
  w.parts.forEach(pt=>{
    html+=`<h2>${pt.title}</h2>\n`;
    pt.eps.forEach(ep=>{
      html+=`<h3>${ep.title}${ep.epTitle?' '+ep.epTitle:''}</h3>\n`;
      if(ep.synopsis)html+=`<p><em>${ep.synopsis}</em></p>\n`;
      if(ep.body)html+=`<pre style="white-space:pre-wrap;font-family:serif;line-height:2">${ep.body}</pre>\n`;
    });
  });
  html+='</body>\n</html>';
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${w.title}.html`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ─── Upload ─── */
const fileInput=g('file-input');
fileInput.addEventListener('change',e=>{
  const f=e.target.files?.[0];if(!f)return;
  set({uploading:true,upErr:''});
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const p=parseHTML(ev.target.result);
      if(!p.parts.length){set({uploading:false,upErr:'파트·화 구조를 찾을 수 없습니다.'});return}
      const id='w'+Date.now();
      const work={id,title:p.title,genre:p.genre||'',description:'',createdAt:new Date().toLocaleDateString('ko-KR'),parts:p.parts,characters:[]};
      const meta={id,title:work.title,genre:work.genre,createdAt:work.createdAt,partCount:work.parts.length,epCount:p.totalEps||0};
      const ws=[...S.works,meta];stS(WK,ws);saveWork(work);
      set({uploading:false,works:ws,page:'editor',work,partId:work.parts[0]?.id||null,epId:null,body:'',dirty:false,upErr:''});
    }catch(err){set({uploading:false,upErr:'파일 오류: '+err.message})}
  };
  rd.onerror=()=>set({uploading:false,upErr:'읽기 실패'});
  rd.readAsText(f,'utf-8');fileInput.value='';
});
function parseHTML(html){
  const jm=html.match(/<script[^>]*id="novel-export-data"[^>]*>([\s\S]*?)<\/script>/);
  if(jm){try{const d=JSON.parse(jm[1]);if(d&&d.parts&&d.title)return{title:d.title,genre:d.genre||'',parts:d.parts,totalEps:d.parts.reduce((s,p)=>s+p.eps.length,0)}}catch{}}
  const doc=new DOMParser().parseFromString(html,'text/html');
  doc.querySelectorAll('script,style').forEach(e=>e.remove());
  let title=(doc.querySelector('h1')?.textContent||doc.querySelector('title')?.textContent||'').trim();
  const raw=(doc.body?.innerText||'').replace(/\r\n|\r/g,'\n');
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const parts=[];let cp=null,ce=null,pid=1,buf=[];
  const fE=()=>{if(ce&&cp){if(buf.length)ce.body=buf.join('\n');cp.eps.push(ce);ce=null;buf=[]}};
  const fP=()=>{fE();if(cp){if(cp.eps.length){cp.startEp=cp.eps[0].id;cp.endEp=cp.eps[cp.eps.length-1].id}parts.push(cp);cp=null}};
  const rP=/^(\d+)\s*부/,rE=/^(\d+)\s*화\s*[.·:—\-]?\s*(.*)/;
  for(const ln of lines){
    if(rP.test(ln)){fP();cp={id:pid++,title:ln,startEp:null,endEp:null,eps:[],status:'done'}}
    else if(rE.test(ln)){const m=ln.match(rE);fE();if(!cp)cp={id:pid++,title:'1부',startEp:null,endEp:null,eps:[],status:'done'};ce={id:parseInt(m[1]),title:`${m[1]}화`,epTitle:m[2].trim(),synopsis:'',body:'',characters:[]};buf=[]}
    else if(ce)buf.push(ln);
    else if(!title&&ln.length<60)title=ln;
  }
  fP();if(!title)title='가져온 작품';
  return{title,genre:'',parts,totalEps:parts.reduce((s,p)=>s+p.eps.length,0)};
}

/* ─── Work management ─── */
function openWork(id){const w=loadWork(id);if(w)set({page:'editor',work:w,partId:w.parts[0]?.id||null,epId:null,body:'',dirty:false,playing:false,ttsStatus:'idle'})}
function delWork(id,e){e.stopPropagation();showConfirm('이 작품을 삭제할까요?',()=>{stD('nv-w-'+id);const ws=S.works.filter(w=>w.id!==id);stS(WK,ws);set({works:ws})})}
function createBlank(){
  const id='w'+Date.now();
  const work={id,title:'새 작품',genre:'',description:'',createdAt:new Date().toLocaleDateString('ko-KR'),parts:[],characters:[]};
  const meta={id,title:work.title,genre:'',createdAt:work.createdAt,partCount:0,epCount:0};
  const ws=[...S.works,meta];stS(WK,ws);saveWork(work);
  set({works:ws,page:'editor',work,partId:null,epId:null,body:'',dirty:false});
}

/* ─ editTitle: re-render 없이 DOM만 업데이트 ─ */
function editTitle(){
  showPrompt('작품 제목',S.work.title,t=>{
    if(!t)return;
    // 1. 현재 본문 보존
    if(editorEl)S.body=editorEl.innerHTML||S.body;
    // 2. 저장
    const w=JSON.parse(JSON.stringify(S.work));w.title=t;saveWork(w);
    const ws=S.works.map(m=>m.id===w.id?{...m,title:t}:m);stS(WK,ws);
    S.work=w;S.works=ws;
    // 3. DOM 직접 업데이트 (re-render 없음 → 본문 유지)
    const btn=g('editor-title-btn');if(btn)btn.textContent=t;
  });
}

function editGenre(){
  showPrompt('장르',S.work.genre||'',v=>{
    if(editorEl)S.body=editorEl.innerHTML||S.body;
    const w=JSON.parse(JSON.stringify(S.work));w.genre=v;saveWork(w);
    const ws=S.works.map(m=>m.id===w.id?{...m,genre:v}:m);stS(WK,ws);
    S.work=w;S.works=ws;
  });
}

/* ─── Parts & Episodes ─── */
function addPart(){
  showPrompt('새 파트 이름',`${(S.work.parts.length?Math.max(...S.work.parts.map(p=>p.id)):0)+1}부`,title=>{
    if(!title)return;
    const w=JSON.parse(JSON.stringify(S.work));
    const newId=(w.parts.length?Math.max(...w.parts.map(p=>p.id)):0)+1;
    w.parts.push({id:newId,title,startEp:null,endEp:null,eps:[],status:'done'});
    saveWork(w);set({work:w,partId:newId,epId:null,body:'',dirty:false});
  });
}
function delPart(id){
  const pt=S.work.parts.find(p=>p.id===id);
  showConfirm(`"${pt?.title||'이 파트'}"를 삭제할까요?`,()=>{
    const w=JSON.parse(JSON.stringify(S.work));
    const idx=w.parts.findIndex(p=>p.id===id);if(idx<0)return;
    w.parts.splice(idx,1);saveWork(w);
    set({work:w,partId:w.parts[0]?.id||null,epId:null,body:'',dirty:false});
  });
}
function addEp(){
  if(!S.partId)return;
  const w=JSON.parse(JSON.stringify(S.work));
  const pt=w.parts.find(p=>p.id===S.partId);if(!pt)return;
  const allIds=w.parts.flatMap(p=>p.eps.map(e=>e.id));
  const newId=allIds.length?Math.max(...allIds)+1:1;
  pt.eps.push({id:newId,title:`${newId}화`,epTitle:'',synopsis:'',body:'',characters:[]});
  pt.startEp=pt.eps[0].id;pt.endEp=pt.eps[pt.eps.length-1].id;
  saveWork(w);set({work:w,epId:newId,body:'',dirty:false});
}
function delEp(epId){
  const ep=S.work.parts.find(p=>p.id===S.partId)?.eps.find(e=>e.id===epId);
  showConfirm(`"${ep?.title||'이 화'}"를 삭제할까요?`,()=>{
    const w=JSON.parse(JSON.stringify(S.work));
    const pt=w.parts.find(p=>p.id===S.partId);if(!pt)return;
    const idx=pt.eps.findIndex(e=>e.id===epId);if(idx<0)return;
    pt.eps.splice(idx,1);
    if(pt.eps.length){pt.startEp=pt.eps[0].id;pt.endEp=pt.eps[pt.eps.length-1].id}
    else{pt.startEp=null;pt.endEp=null}
    saveWork(w);
    const nEid=pt.eps[0]?.id||null;
    set({work:w,epId:nEid,body:nEid?pt.eps.find(e=>e.id===nEid)?.body||'':'',dirty:false});
  });
}
function autoSave(){
  if(!S.epId||!S.work||!editorEl)return;

/* ─── 시놉시스 자동 생성 ─── */
function autoSynopsis(text){
  if(!text||text.length<30)return '';
  const flat=text.replace(/\n+/g,' ').replace(/\s{2,}/g,' ').trim();
  const sents=flat.split(/(?<=[.!?\u2026])\s+/).map(s=>s.trim()).filter(s=>s.length>8);
  if(!sents.length)return flat.slice(0,200);
  const total=sents.length;
  const scored=sents.map((s,i)=>{
    let sc=0,pos=i/total;
    if(pos<0.15)sc+=3;if(pos>0.8)sc+=3;if(pos>0.4&&pos<0.65)sc+=2;
    if(s.length>=20&&s.length<=100)sc+=2;
    if(/결심|깨달|결정|선택|도망|추격|발견|죽었|살았|싸움|대결|만났|헤어|배신|충격|눈물|분노|공포|위기|탈출|고백|비밀|진실/.test(s))sc+=3;
    if(/^(그러나|하지만|그런데|마침내|결국|드디어|그때|순간|갑자기)/.test(s))sc+=3;
    return{s,i,sc};
  });
  scored.sort((a,b)=>b.sc-a.sc);
  const gap=Math.max(2,Math.floor(total/5));
  const chosen=[];
  for(let k=0;k<scored.length&&chosen.length<4;k++){
    const item=scored[k];
    if(!chosen.some(c=>Math.abs(c.i-item.i)<gap))chosen.push(item);
  }
  return chosen.sort((a,b)=>a.i-b.i).map(c=>c.s).join(' ').slice(0,220);
}

/* ─── 저장 ─── */
function doSave(){
  if(!S.epId||!editorEl)return;
  const bodyHTML=editorEl.innerHTML||'';
  const bodyText=editorEl.innerText||'';

  ep.body=bodyHTML;

/* ─── 숫자 목록 ─── */
function bldNums(c){
  c.innerHTML='';
  if(!editorEl){
    c.appendChild(mk('div',{innerHTML:'<i class="ti ti-hash" style="font-size:18px;display:block;margin:0 auto 8px;opacity:.25"></i>에피소드<br>선택 후 표시',style:{fontSize:'10px',color:'var(--tt)',textAlign:'center',padding:'20px 6px',lineHeight:'1.8'}}));
    return;
  }

  // TreeWalker로 실제 DOM 텍스트 노드를 순회하며 숫자 수집
  // → 노드 참조를 직접 저장해서 클릭 시 정확히 사용
  const numbers=[];
  const walker=document.createTreeWalker(editorEl,NodeFilter.SHOW_TEXT,null,false);
  while(walker.nextNode()){
    const nd=walker.currentNode;
    const text=nd.nodeValue||'';
    let m;const rg=/\d+/g;
    while((m=rg.exec(text))!==null){
      numbers.push({
        v:m[0],
        node:nd,           // 실제 텍스트 노드 참조
        offset:m.index,    // 해당 노드 내 오프셋
        ctx:text.slice(Math.max(0,m.index-10),m.index)+'['+m[0]+']'+text.slice(m.index+m[0].length,m.index+m[0].length+10)
      });
    }
  }

  if(!numbers.length){
    c.appendChild(mk('div',{innerHTML:'<i class="ti ti-hash" style="font-size:18px;display:block;margin:0 auto 8px;opacity:.25"></i>숫자 없음',style:{fontSize:'10px',color:'var(--tt)',textAlign:'center',padding:'20px 6px',lineHeight:'1.8'}}));
    return;
  }

  numbers.forEach(n=>{
    const chip=mk('div',{style:{marginBottom:'4px',padding:'5px 7px',borderRadius:R,border:BD,background:'#fff',cursor:'pointer',transition:'all .12s'}});
    chip.title='클릭: 해당 위치로 이동';
    chip.appendChild(mk('div',{textContent:n.v,style:{fontSize:'15px',fontWeight:'700',color:'var(--tp)',marginBottom:'2px'}}));
    chip.appendChild(mk('div',{textContent:n.ctx,style:{fontSize:'9px',color:'var(--tt)',lineHeight:'1.4',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}));
    chip.addEventListener('mouseenter',()=>{chip.style.background='var(--ci)';chip.style.borderColor='var(--bi)'});
    chip.addEventListener('mouseleave',()=>{chip.style.background='#fff';chip.style.borderColor='rgba(26,26,24,.1)'});
    chip.onclick=()=>{
      // 저장된 노드 참조로 바로 Range 생성
      try{
        const range=document.createRange();
        range.setStart(n.node,n.offset);
        range.setEnd(n.node,Math.min(n.offset+n.v.length,n.node.nodeValue.length));
        const sel=window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        // editorEl이 스크롤 컨테이너이므로 editorEl.scrollTop 조정
        const rRect=range.getBoundingClientRect();
        const eRect=editorEl.getBoundingClientRect();
        if(rRect.top<eRect.top||rRect.bottom>eRect.bottom){
          // 선택된 위치가 에디터 중앙에 오도록 스크롤
          const targetScrollTop=editorEl.scrollTop+(rRect.top-eRect.top)-(eRect.height/2-rRect.height/2);
          editorEl.scrollTo({top:targetScrollTop,behavior:'smooth'});
        }
      }catch(e){console.warn('scroll error:',e)}
    };
    c.appendChild(chip);
  });
}

/* ─── 형광펜 ─── */
let _hlMode=false;
function applyHighlight(){
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed||!editorEl||!editorEl.contains(sel.anchorNode))return;
  const range=sel.getRangeAt(0);
  if(!range.toString().trim())return;
  // 이미 mark 안이면 제거
  const anc=sel.anchorNode.parentElement;
  if(anc&&anc.tagName==='MARK'){
    const parent=anc.parentNode;
    while(anc.firstChild)parent.insertBefore(anc.firstChild,anc);
    parent.removeChild(anc);
  }else{
    const mark=document.createElement('mark');
    try{range.surroundContents(mark)}catch{
      const frag=range.extractContents();mark.appendChild(frag);range.insertNode(mark);
    }
  }
  sel.removeAllRanges();
  S.dirty=true;
  const hlp=g('hllist');if(hlp)bldHighlights(hlp);
}
function bldHighlights(c){
  c.innerHTML='';
  if(!editorEl){
    c.appendChild(mk('div',{innerHTML:'<i class="ti ti-highlight" style="font-size:20px;display:block;margin:0 auto 8px;opacity:.25"></i>에피소드를<br>선택하세요',style:{fontSize:'10px',color:'var(--tt)',textAlign:'center',padding:'20px 6px',lineHeight:'1.8'}}));
    return;
  }
  const marks=editorEl.querySelectorAll('mark');
  if(!marks.length){
    c.appendChild(mk('div',{innerHTML:'<i class="ti ti-highlight" style="font-size:20px;display:block;margin:0 auto 8px;opacity:.25"></i>형광펜으로<br>표시한 내용이<br>여기 정리돼요',style:{fontSize:'10px',color:'var(--tt)',textAlign:'center',padding:'20px 6px',lineHeight:'1.8'}}));
    return;
  }
  marks.forEach((m,i)=>{
    const txt=(m.textContent||'').trim();if(!txt)return;
    const chip=mk('div',{style:{marginBottom:'6px',padding:'7px 8px',borderRadius:R,background:'#fffde7',border:'1px solid #fde047',display:'flex',alignItems:'flex-start',gap:'6px'}});
    // 텍스트 (클릭: 이동)
    const label=mk('div',{style:{flex:'1',fontSize:'11px',color:'#78350f',lineHeight:'1.5',fontWeight:'500',cursor:'pointer'}});
    label.textContent=`${i+1}. ${txt.length>55?txt.slice(0,55)+'…':txt}`;
    label.onclick=()=>{
      m.scrollIntoView({block:'center'});
      const r=document.createRange();r.selectNodeContents(m);
      window.getSelection().removeAllRanges();window.getSelection().addRange(r);
      if(editorEl){
        const rRect=m.getBoundingClientRect();
        const eRect=editorEl.getBoundingClientRect();
        editorEl.scrollTo({top:rRect.top-eRect.top+editorEl.scrollTop-eRect.height/2,behavior:'smooth'});
      }
    };
    // X 버튼: 형광펜 제거
    const xBtn=mk('button');xBtn.innerHTML='<i class="ti ti-x" style="font-size:10px"></i>';
    Object.assign(xBtn.style,{border:'none',background:'rgba(0,0,0,.08)',cursor:'pointer',color:'#78350f',padding:'2px 5px',borderRadius:'4px',flexShrink:'0',display:'flex',alignItems:'center',lineHeight:'1'});
    xBtn.onclick=e=>{
      e.stopPropagation();
      const parent=m.parentNode;
      if(parent){while(m.firstChild)parent.insertBefore(m.firstChild,m);parent.removeChild(m);}
      S.dirty=true;
      // S.body 즉시 갱신
      if(editorEl)S.body=editorEl.innerHTML;
      bldHighlights(c);
    };
    chip.append(label,xBtn);
    c.appendChild(chip);
  });
}

function getWMemos(){return stG('nv-fm-'+(S.work?.id||''))||[]}
function saveWMemos(ms){stS('nv-fm-'+(S.work?.id||''),ms)}
function addFloatingMemo(){
  const ms=getWMemos();
  const offset=(ms.length%5)*24;
  ms.push({id:'fm'+Date.now(),content:'',x:40+offset,y:40+offset,w:220,h:180});

}
function renderMemoLayer(){
  const layer=g('memo-layer');if(!layer)return;
  layer.innerHTML='';
  const MEMO_BG='rgba(238,241,245,0.5)'; // 50% 반투명
  const BAR_BG='rgba(200,205,214,0.7)';
  getWMemos().forEach(m=>{
    const note=mk('div',{style:{
      position:'absolute',left:m.x+'px',top:m.y+'px',
      width:m.w+'px',height:m.h+'px',
      background:MEMO_BG,
      backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',
      border:'1px solid rgba(200,205,214,0.6)',
      borderRadius:'10px',boxShadow:'0 4px 20px rgba(0,0,0,.15)',
      display:'flex',flexDirection:'column',
      zIndex:'50',pointerEvents:'all',userSelect:'none',overflow:'hidden'
    }});

    // 타이틀바 (드래그 핸들)
    const bar=mk('div',{style:{
      display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'7px 10px',background:BAR_BG,
      borderRadius:'9px 9px 0 0',flexShrink:'0',
      cursor:'grab',touchAction:'none'
    }});
    bar.appendChild(mk('span',{innerHTML:'<i class="ti ti-grip-horizontal" style="font-size:12px;color:rgba(0,0,0,.4)"></i>'}));
    const del=mk('button');del.innerHTML='<i class="ti ti-x" style="font-size:11px"></i>';
    del.onclick=()=>{saveWMemos(getWMemos().filter(n=>n.id!==m.id));renderMemoLayer()};
    Object.assign(del.style,{border:'none',background:'transparent',cursor:'pointer',color:'rgba(0,0,0,.5)',padding:'3px 5px',borderRadius:'4px',display:'flex'});
    bar.appendChild(del);note.appendChild(bar);

    // 텍스트 영역
    const ta=document.createElement('textarea');ta.value=m.content;ta.placeholder='메모 입력…';
    Object.assign(ta.style,{
      flex:'1',width:'100%',padding:'9px 11px',
      border:'none',outline:'none',background:'transparent',
      fontSize:'13px',lineHeight:'1.8',color:'#2a2a28',
      resize:'none',fontFamily:'inherit',cursor:'text',overflowY:'auto',
      touchAction:'auto'
    });
    ta.addEventListener('mousedown',e=>e.stopPropagation());
    ta.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
    let saveT=null;
    ta.oninput=()=>{
      clearTimeout(saveT);
      saveT=setTimeout(()=>saveWMemos(getWMemos().map(n=>n.id===m.id?{...n,content:ta.value}:n)),400);
    };
    note.appendChild(ta);

    // 리사이즈 핸들 (마우스)
    const rsz=mk('div',{style:{position:'absolute',right:'0',bottom:'0',width:'20px',height:'20px',cursor:'se-resize',display:'flex',alignItems:'flex-end',justifyContent:'flex-end',padding:'3px',touchAction:'none'}});
    rsz.innerHTML='<svg width="10" height="10" viewBox="0 0 10 10"><path d="M9 1L1 9M9 5L5 9" stroke="rgba(0,0,0,.3)" stroke-width="1.2" stroke-linecap="round"/></svg>';
    let rsx,rsy,rsw,rsh;
    rsz.addEventListener('mousedown',e=>{
      e.stopPropagation();e.preventDefault();
      rsx=e.clientX;rsy=e.clientY;rsw=parseInt(note.style.width);rsh=parseInt(note.style.height);
      const mv=e=>{note.style.width=Math.max(160,rsw+e.clientX-rsx)+'px';note.style.height=Math.max(120,rsh+e.clientY-rsy)+'px'};
      const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);saveWMemos(getWMemos().map(n=>n.id===m.id?{...n,w:parseInt(note.style.width),h:parseInt(note.style.height)}:n))};
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    });
    // 리사이즈 핸들 (터치)
    rsz.addEventListener('touchstart',e=>{
      e.stopPropagation();e.preventDefault();
      const t=e.touches[0];rsx=t.clientX;rsy=t.clientY;rsw=parseInt(note.style.width);rsh=parseInt(note.style.height);
    },{passive:false});
    rsz.addEventListener('touchmove',e=>{
      e.stopPropagation();e.preventDefault();
      const t=e.touches[0];
      note.style.width=Math.max(160,rsw+t.clientX-rsx)+'px';
      note.style.height=Math.max(120,rsh+t.clientY-rsy)+'px';
    },{passive:false});
    rsz.addEventListener('touchend',()=>saveWMemos(getWMemos().map(n=>n.id===m.id?{...n,w:parseInt(note.style.width),h:parseInt(note.style.height)}:n)));
    note.appendChild(rsz);

    // 드래그 — 마우스
    let sx,sy,sl,st;
    bar.addEventListener('mousedown',e=>{
      if(e.target.closest('button'))return;
      bar.style.cursor='grabbing';
      sx=e.clientX;sy=e.clientY;sl=parseInt(note.style.left)||0;st=parseInt(note.style.top)||0;
      const mv=e=>{note.style.left=Math.max(0,sl+e.clientX-sx)+'px';note.style.top=Math.max(0,st+e.clientY-sy)+'px'};
      const up=()=>{
        bar.style.cursor='grab';
        document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);
        saveWMemos(getWMemos().map(n=>n.id===m.id?{...n,x:parseInt(note.style.left),y:parseInt(note.style.top)}:n));
      };
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);e.preventDefault();
    });

    // 드래그 — 터치 (아이폰/아이패드)
    let tx,ty,tl,tt_,dragging=false;
    bar.addEventListener('touchstart',e=>{
      if(e.target.closest('button'))return;
      e.preventDefault();dragging=true;
      const t=e.touches[0];
      tx=t.clientX;ty=t.clientY;
      tl=parseInt(note.style.left)||0;tt_=parseInt(note.style.top)||0;
    },{passive:false});
    bar.addEventListener('touchmove',e=>{
      if(!dragging)return;
      e.preventDefault();
      const t=e.touches[0];
      note.style.left=Math.max(0,tl+t.clientX-tx)+'px';
      note.style.top=Math.max(0,tt_+t.clientY-ty)+'px';
    },{passive:false});
    bar.addEventListener('touchend',()=>{
      if(!dragging)return;dragging=false;
      saveWMemos(getWMemos().map(n=>n.id===m.id?{...n,x:parseInt(note.style.left),y:parseInt(note.style.top)}:n));
    });

    layer.appendChild(note);
  });
}

      card.append(top,gn,ft);grid.appendChild(card);

  }
  main.appendChild(body);app.append(sb,main);
}

  }else if(!cp.eps.length){

    em.onclick=addEp;em.addEventListener('mouseenter',()=>em.style.background=E2_HOV);em.addEventListener('mouseleave',()=>em.style.background='transparent');
    p2l.appendChild(em);
  }else{
    cp.eps.forEach(e=>{
      const ac=S.epId===e.id;
      const it=mk('div',{style:{padding:'7px 10px',cursor:'pointer',borderBottom:`1px solid ${E2_BD}`,background:ac?E2_AC:'transparent',display:'flex',alignItems:'flex-start',gap:'4px'}});

  p5.appendChild(mk('div',{innerHTML:'<span style="font-size:9px;font-weight:700;color:#9a9895;letter-spacing:.06em;text-transform:uppercase">숫자 목록</span>',style:{padding:'7px 10px',borderBottom:`1px solid ${E2_BD}`,flexShrink:'0'}}));

  pnls.append(p1,p2,p3,p4,p5);
  wrap.appendChild(pnls);app.appendChild(wrap);

  // 에디터 내용 주입 + 패널 채우기
  requestAnimationFrame(()=>{
    if(editorEl&&ce){
      editorEl.innerHTML=S.body||'';

    }else{

      const nl=g('nlist');if(nl){nl.innerHTML='';nl.appendChild(mk('div',{innerHTML:'에피소드<br>선택 후 표시',style:{fontSize:'10px',color:'#9a9895',textAlign:'center',padding:'16px 6px',lineHeight:'1.8'}}))}
    }
    renderMemoLayer();
  });
}

function render(){
  if(isMobile()){
    if(S.page==='main')renderMainMobile();
    else renderEditorMobile();
  }else{
    if(S.page==='main')renderMain();
    else renderEditor();
  }
}

/* ═══════════════════════════════════════════════════════
   MOBILE DETECTION
═══════════════════════════════════════════════════════ */
function isMobile(){
  return /iPhone|iPod/.test(navigator.userAgent)||
    (window.innerWidth<=768&&navigator.maxTouchPoints>0);
}
window.addEventListener('resize',()=>{
  if(S.page==='main'||S.page==='editor')render();
});

        it.append(txt,del);scr.appendChild(it);
      });
      const addRow=mk('button');addRow.innerHTML=`<i class="ti ti-plus" style="font-size:14px"></i> 화 추가`;addRow.onclick=addEp;
      Object.assign(addRow.style,{width:'100%',padding:'12px',border:BD,borderRadius:'12px',background:'transparent',color:'var(--ts)',fontSize:'13px',cursor:'pointer',display:'flex',alignItems:'center',gap:'6px',justifyContent:'center',marginTop:'4px'});
      scr.appendChild(addRow);
    }
    content.appendChild(scr);

  }else if(S.mobileTab==='body'||S.mobileTab==='hl'||S.mobileTab==='nums'){
    // 본문 에디터 (항상 렌더, hl/nums는 위에 슬라이드업 시트로 표시)
    if(!ce){
      content.appendChild(mk('div',{innerHTML:'<i class="ti ti-pencil" style="font-size:36px;display:block;margin:60px auto 14px;color:var(--tt)"></i><div style="text-align:center;color:var(--tt);font-size:14px">화를 선택하면<br>여기서 글을 쓸 수 있어요</div>',style:{flex:'1',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}));
    }else{
      // 에피소드 제목 바
      const epHdr=mk('div',{style:{padding:'8px 14px',borderBottom:BD,flexShrink:'0',background:'var(--cs)',display:'flex',alignItems:'center',gap:'6px'}});
      epHdr.appendChild(mk('span',{textContent:ce.title,style:{fontSize:'12px',color:'var(--tt)'}}));
      epHdr.appendChild(mk('span',{textContent:'·',style:{fontSize:'12px',color:'var(--tt)'}}));
      const epTitleSpan=mk('span',{style:{fontSize:'12px',fontWeight:'600',color:'var(--tp)',flex:'1',cursor:'pointer'}});
      epTitleSpan.textContent=ce.epTitle||'제목 탭하여 입력';
      epTitleSpan.onclick=()=>{
        if(_hlMode)return; // 형광펜 모드엔 편집 차단
        const inp=document.createElement('input');inp.type='text';inp.value=ce.epTitle||'';inp.placeholder='이 화의 제목';
        Object.assign(inp.style,{fontSize:'12px',fontWeight:'600',color:'var(--tp)',border:'.5px solid var(--bi)',borderRadius:'4px',padding:'2px 6px',background:'var(--ci)',outline:'none',width:'160px'});
        epTitleSpan.replaceWith(inp);inp.focus();
        let done_=false;
        const done=()=>{if(done_)return;done_=true;const val=inp.value.trim();epTitleSpan.textContent=val||'제목 탭하여 입력';if(inp.isConnected)inp.replaceWith(epTitleSpan);const w=JSON.parse(JSON.stringify(S.work));const pt2=w.parts.find(p=>p.id===S.partId);if(pt2){const ep2=pt2.eps.find(e=>e.id===S.epId);if(ep2)ep2.epTitle=val}saveWork(w);S.work=w};
        inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();done()}};
      };
      epHdr.appendChild(epTitleSpan);
      // 형광펜 모드 표시 배지
      if(_hlMode){
        const hlBadge=mk('div',{style:{fontSize:'10px',padding:'2px 8px',background:'#fef08a',color:'#92400e',borderRadius:'10px',fontWeight:'600',flexShrink:'0'}});
        hlBadge.textContent='형광펜 모드';epHdr.appendChild(hlBadge);
      }
      const cc=mk('span',{id:'cc',style:{fontSize:'11px',color:'var(--tt)',whiteSpace:'nowrap'}});
      cc.textContent=(S.body?S.body.replace(/<[^>]+>/g,'').length:0).toLocaleString()+'자';
      const dot=mk('span',{id:'ddot',style:{color:'var(--tw)',display:S.dirty?'':'none',fontSize:'12px',marginLeft:'2px'},textContent:'●'});
      epHdr.append(cc,dot);content.appendChild(epHdr);

      // 에디터 영역
      const taw=mk('div',{style:{flex:'1',display:'flex',flexDirection:'column',padding:'10px 14px 6px',overflow:'hidden',background:'#fff',position:'relative'}});
      const editor=document.createElement('div');editor.id='body-editor';
      editor.style.fontSize='16px';
      editor.setAttribute('autocorrect','off');
      editor.setAttribute('autocomplete','off');
      editor.setAttribute('autocapitalize','off');
      editor.setAttribute('spellcheck','false');

      if(_hlMode){
        // 형광펜 모드: 편집 비활성화, 터치로 문장 선택 후 형광펜 적용
        editor.contentEditable='false';
        editor.style.cursor='crosshair';
        // 더블탭으로 문장 선택 후 형광펜 적용
        let lastTap=0;
        editor.addEventListener('touchend',e=>{
          e.preventDefault();
          const now=Date.now();
          const isDblTap=now-lastTap<350;
          lastTap=now;
          if(!isDblTap)return; // 더블탭만 처리
          const touch=e.changedTouches[0];
          let range=null;
          if(document.caretRangeFromPoint){
            range=document.caretRangeFromPoint(touch.clientX,touch.clientY);
          }else if(document.caretPositionFromPoint){
            const pos=document.caretPositionFromPoint(touch.clientX,touch.clientY);
            if(pos){range=document.createRange();range.setStart(pos.offsetNode,pos.offset);range.collapse(true)}
          }
          if(!range)return;
          const nd=range.startContainer;
          if(!nd||nd.nodeType!==Node.TEXT_NODE)return;
          const txt=nd.textContent||'';
          const offset=range.startOffset;
          let start=offset,end=offset;
          while(start>0&&!/[.!?\n]/.test(txt[start-1]))start--;
          while(end<txt.length&&!/[.!?\n]/.test(txt[end]))end++;
          if(start===end){start=0;end=txt.length}
          const selRange=document.createRange();
          selRange.setStart(nd,start);
          selRange.setEnd(nd,Math.min(end+1,txt.length));
          window.getSelection().removeAllRanges();window.getSelection().addRange(selRange);
          setTimeout(()=>{
            applyHighlight();
            if(editorEl)S.body=editorEl.innerHTML; // 형광펜 즉시 저장
            showMobileSheet('hl');
          },50);
        },{passive:false});
      }else{
        editor.contentEditable='true';
        editor.oninput=()=>{
          S.dirty=true;
          const cc2=g('cc');if(cc2)cc2.textContent=(editor.innerText||'').length.toLocaleString()+'자';
          const dot2=g('ddot');if(dot2)dot2.style.display='';
        };
      }
      taw.appendChild(editor);content.appendChild(taw);editorEl=editor;

      // 하단 툴바
      const ft=mk('div',{style:{display:'flex',gap:'8px',padding:'10px 16px 20px',borderTop:BD,flexShrink:'0',alignItems:'center',justifyContent:'space-around',background:'#eef1f5'}});
      const saveBtn=mkBtn(`<i class="ti ti-device-floppy" style="font-size:18px"></i>`,doSave,{id:'sbtn',style:{padding:'11px 16px',flexShrink:'0',border:S.dirty?'.5px solid var(--bi)':BD,background:S.dirty?'var(--ci)':'#fff',color:S.dirty?'var(--ti)':'var(--tt)',borderRadius:'10px'}});
      const hlBtn=mk('button');hlBtn.innerHTML=`<i class="ti ti-highlight" style="font-size:18px"></i>`;
      Object.assign(hlBtn.style,{padding:'11px 16px',border:_hlMode?'2px solid #fde047':BD,borderRadius:'10px',cursor:'pointer',background:_hlMode?'#fef9c3':'#fff',color:_hlMode?'#ca8a04':'var(--tt)',flexShrink:'0',display:'flex',alignItems:'center'});
      hlBtn.onclick=()=>{_hlMode=!_hlMode;render()};
      const memoBtn=mk('button');memoBtn.innerHTML=`<i class="ti ti-notebook" style="font-size:18px"></i>`;memoBtn.onclick=addFloatingMemo;
      Object.assign(memoBtn.style,{padding:'11px 16px',border:BD,borderRadius:'10px',cursor:'pointer',background:'#fff',color:'var(--tt)',flexShrink:'0',display:'flex',alignItems:'center'});
      const spBtn=mk('button');
      spBtn.innerHTML=S.playing?`<i class="ti ti-player-pause" style="font-size:18px"></i>`:`<i class="ti ti-player-play" style="font-size:18px"></i>`;
      spBtn.disabled=!S.body;spBtn.onclick=togSp;
      Object.assign(spBtn.style,{padding:'11px 16px',border:S.playing?'.5px solid var(--bw)':BD,borderRadius:'10px',background:S.playing?'var(--cw)':'#fff',color:S.playing?'var(--tw)':'var(--tt)',flexShrink:'0',display:'flex',alignItems:'center',opacity:S.body?'1':'0.4'});
      const fmtBtn=mkBtn(`<i class="ti ti-layout-list" style="font-size:18px"></i>`,doFormat,{style:{padding:'11px 16px',flexShrink:'0',background:'#fff',color:'var(--tt)',borderRadius:'10px'}});
      ft.append(saveBtn,hlBtn,memoBtn,spBtn,fmtBtn);
      content.appendChild(ft);

      // 메모 레이어
      const memoLayer=mk('div',{id:'memo-layer',style:{position:'absolute',inset:'0',pointerEvents:'none',zIndex:'40',overflow:'hidden'}});
      content.appendChild(memoLayer);
    }
  } // end else if body/hl/nums

  app.appendChild(content);

  // ── 하단 탭 바 (JS로 실제 bottom 여백 계산)
  const tabBottomPad=34;
  const tabBar=mk('div',{style:{
    display:'flex',background:'#1c2a38',
    borderTop:'1px solid rgba(255,255,255,.08)',
    flexShrink:'0',
    paddingBottom:tabBottomPad+'px',
    boxSizing:'border-box'
  }});
  const tabs=[
    {id:'parts',icon:'ti-folder',label:'파트'},
    {id:'eps',icon:'ti-list',label:'화'},
    {id:'body',icon:'ti-pencil',label:'본문'},
    {id:'hl',icon:'ti-highlight',label:'형광펜'},
    {id:'nums',icon:'ti-hash',label:'숫자'},
  ];
  tabs.forEach(tab=>{
    const isBodyGroup=S.mobileTab==='body'||S.mobileTab==='hl'||S.mobileTab==='nums';
    const ac=(tab.id==='body'&&isBodyGroup)||tab.id===S.mobileTab;
    const btn=mk('button');
    btn.innerHTML=`<i class="ti ${tab.icon}" style="font-size:22px;display:block;margin:0 auto 3px"></i><span style="font-size:10px;letter-spacing:-.01em">${tab.label}</span>`;
    Object.assign(btn.style,{
      flex:'1',padding:'10px 2px 8px',border:'none',
      background:'transparent',
      color:ac?'#a8c4dc':'rgba(226,232,240,.38)',
      cursor:'pointer',display:'flex',flexDirection:'column',
      alignItems:'center',gap:'0',fontFamily:'inherit',
      borderTop:ac?'2px solid #a8c4dc':'2px solid transparent',
      minWidth:'0',WebkitTapHighlightColor:'transparent'
    });
    btn.onclick=()=>{
      // 탭 전환 전 현재 본문(형광펜 포함) 저장
      if(editorEl)S.body=editorEl.innerHTML;
      if(tab.id==='hl'||tab.id==='nums'){
        if(S.mobileTab!=='body'&&S.mobileTab!=='hl'&&S.mobileTab!=='nums')S.mobileTab='body';
        render();
        setTimeout(()=>showMobileSheet(tab.id),50);
      }else{
        S.mobileTab=tab.id;render();
      }
    };
    tabBar.appendChild(btn);
  });
  app.appendChild(tabBar);

  // 콘텐츠 주입
  requestAnimationFrame(()=>{
    if(editorEl&&ce){
      editorEl.innerHTML=S.body||'';
    }
    renderMemoLayerMobile();
  });
}

/* ── 모바일 하단 슬라이드업 시트 ─── */
function showMobileSheet(type){
  const old=g('mobile-sheet');if(old)old.remove();
  const oldOv=g('mobile-sheet-ov');if(oldOv)oldOv.remove();
  const ov=mk('div',{id:'mobile-sheet-ov',style:{position:'fixed',inset:'0',background:'rgba(0,0,0,.3)',zIndex:'200'}});
  const sheet=mk('div',{id:'mobile-sheet',style:{position:'fixed',left:'0',right:'0',bottom:'0',height:'55%',background:'var(--cp)',borderRadius:'16px 16px 0 0',boxShadow:'0 -4px 30px rgba(0,0,0,.2)',zIndex:'201',display:'flex',flexDirection:'column',transform:'translateY(100%)',transition:'transform .3s ease'}});
  const handle=mk('div',{style:{padding:'10px 0 4px',display:'flex',justifyContent:'center',flexShrink:'0',cursor:'pointer'}});
  handle.innerHTML='<div style="width:36px;height:4px;background:var(--bt);border-radius:2px"></div>';
  const close=()=>{sheet.style.transform='translateY(100%)';setTimeout(()=>{ov.remove();sheet.remove()},300)};
  handle.onclick=close;ov.onclick=close;
  const shHdr=mk('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px 10px',flexShrink:'0',borderBottom:BD}});
  const title=type==='hl'?'형광펜 목록':'숫자 목록';
  const icon=type==='hl'?'ti-highlight':'ti-hash';
  shHdr.appendChild(mk('div',{innerHTML:`<i class="ti ${icon}" style="font-size:14px;vertical-align:-1px;margin-right:5px"></i><b>${title}</b>`,style:{fontSize:'14px',color:'var(--tp)'}}));
  const closeBtn=mk('button');closeBtn.innerHTML='<i class="ti ti-x" style="font-size:16px"></i>';closeBtn.onclick=close;
  Object.assign(closeBtn.style,{border:'none',background:'transparent',cursor:'pointer',color:'var(--tt)',padding:'4px'});
  shHdr.appendChild(closeBtn);
  const listEl=mk('div',{id:type==='hl'?'hllist':'nlist',style:{flex:'1',overflowY:'auto',padding:'12px'}});
  sheet.append(handle,shHdr,listEl);
  document.body.append(ov,sheet);
  requestAnimationFrame(()=>{
    sheet.style.transform='translateY(0)';
    if(type==='hl')bldHighlights(listEl);
    else bldNums(listEl);
  });
}

// PWA 서비스워커
if('serviceWorker' in navigator){
  const sw=`const C='nv1780160336';self.addEventListener('install',e=>{self.skipWaiting();e.waitUntil(caches.open(C).then(c=>c.add('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css').catch(()=>{})))});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim()});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))})`;
  const blob=new Blob([sw],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url,{scope:'./'}).then(()=>URL.revokeObjectURL(url)).catch(()=>{});
}

if('speechSynthesis' in window){window.speechSynthesis.onvoiceschanged=loadVoices;loadVoices()}

// 구버전 키 포함 works 로드
function loadAllWorks(){
  const keys=['nv-tts-v2','nv-tts-v1','nv-works-v1','nv-works'];
  let works=[];
  const seen=new Set();
  keys.forEach(k=>{
    const ws=stG(k)||[];
    ws.forEach(w=>{if(w&&w.id&&!seen.has(w.id)){seen.add(w.id);works.push(w)}});
  });
  // 현재 키로 통합 저장
  if(works.length)stS(WK,works);
  return works;
}
const ws=loadAllWorks();set({works:ws});
